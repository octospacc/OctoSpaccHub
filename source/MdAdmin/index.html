$('#addsite-button').addEventListener('click', async () => {
	const type = $('#site-type-select').selectedOptions[0].value;
    const url = $('#site-url-input').value.trim();
    const user = $('#site-user-input').value.trim();
    const pass = $('#site-pass-input').value.trim();
    const repo = $('#site-repo-input').value.trim();
    const branch = $('#site-branch-input').value.trim();
    const token = $('#site-token-input').value.trim();
    let name = $('#site-name-input').value.trim();

    if (type === 'disk') {
    	const handle = await showDirectoryPicker();
    	await saveDiskHandle(sites.length, handle);
    	if (!name)
    		name = `${handle.name} (Local)`;
    } else if (type === 'gitlab') {
    	for (const item of ['url','repo'])
    		$(`#site-${item}-input`).classList.remove('invalid');
    	if (!repo) {
    		$('#site-repo-input').classList.add('invalid');
    		return;
    	}
    	if (!name)
    		name = `${url}/${repo}#${branch} (GitLab)`;
    } else if (type === 'dav') {
        let failed = false;
        for (const item of ['url','user','pass'])
            $(`#site-${item}-input`).classList.remove('invalid');

        if (!url || (!url.toLowerCase().startsWith('http://') && !url.toLowerCase().startsWith('https://'))) {
            $('#site-url-input').classList.add('invalid');
            failed = true;
        }
        if (!user) {
            $('#site-user-input').classList.add('invalid');
            failed = true;
        }
        if (!pass) {
            $('#site-pass-input').classList.add('invalid');
            failed = true;
        }
        if (failed) return;
    	if (!name)
    		name = `${user}@${url} (WebDAV)`;
    }

    sites.push({ name, url, user, pass, repo, branch, token, type });
    Spacc.LocalStorage('sites', sites);
    refreshSites();
    $('#site-select').selectedIndex = sites.length - 1;
    loadSite();

    $('#addsite-modal').hidePopover();
    $('#addsite-form').reset();
});

$('#site-type-select').addEventListener('change', () => {
	switch ($('#site-type-select').selectedOptions[0].value) {
		case 'dav':
			for (const item of ['url','user','pass'])
				$(`#site-${item}-input`).parentElement.hidden = false;
			for (const item of ['repo','branch','token'])
				$(`#site-${item}-input`).parentElement.hidden = true;
			break;
		case 'github':
		case 'gitlab':
			for (const item of ['url','repo','branch','token'])
				$(`#site-${item}-input`).parentElement.hidden = false;
			for (const item of ['user','pass'])
				$(`#site-${item}-input`).parentElement.hidden = true;
			break;
		case 'disk':
			for (const item of ['url','user','pass','repo','branch','token'])
				$(`#site-${item}-input`).parentElement.hidden = true;
			break;
	}
});

$('#upload-input').addEventListener('change', handleUploadInput);

$('#upload-dropzone').addEventListener('drop', e => {
    e.preventDefault();
    $('#upload-input').files = e.dataTransfer.files;
    handleUploadInput();
});

function handleUploadInput() {
    const file = $('#upload-input').files[0];
    if (!file) return;
    $('#load-progress').hidden = false;
    $('#upload-result').hidden = true;
    const reader = new FileReader();
    reader.onload = async () => {
        const filepath = `/${Date.now()}_${file.name}`;
        const type = file.type.split('/')[0];
        await writeFile(`${siteConf?.media?.[0] || '/'}/${filepath}`, reader.result);
        let [html, markdown] = ['', `[${file.name}]`];
        switch (type) {
            case 'image':
                html = `<img src="${filepath}" alt="${file.name}" />`;
                markdown = `![${file.name}]`;
                break;
            case 'video':
            case 'audio':
                html = `<${type} src="${filepath}" controls></${type}>`;
                break;
            default:
                html = `<a src="${filepath}">${file.name}</a>`;
        }
        $('#upload-result').innerHTML = `
            <h6>File URL</h6>
            <input type="text" readonly value="${filepath}" />
            <h6>Markdown</h6>
            <textarea readonly>${markdown}(${filepath})</textarea>
            <h6>HTML</h6>
            <textarea readonly>${html}</textarea>
            <br /><br />
        `;
        $('#upload-result').hidden = false;
        $('#load-progress').hidden = true;
        refreshSiteContents();
    };
    reader.readAsArrayBuffer(file);
}

function refreshSites() {
    $('#site-select').innerHTML = '';
    for (const i in sites) {
        const site = sites[i];
        $('#site-select').appendChild($(`<option value="${i}">${site.name || site.url}</option>`));
    }
}

function getSiteListProp(key, ...def) {
    return (siteConf?.[key] || def).filter(e => e !== undefined);
}

async function loadSite() {
    const i = getCurrentSiteIndex();
    if (i === null) return;
    $('#siteconf-save-button').disabled = true;
    $('#siteconf-modal textarea').disabled = true;
    $('button[popovertarget=siteconf-modal]').hidden = false;
    $('#load-progress').hidden = false;
    $('#site-sections').hidden = true;

    setHash();
    const site = sites[i];

    switch (site.type) {
    	case 'dav':
    		webDAV = newWebDAV(site.url, { username: site.user, password: site.pass });
    		break;
    	case 'gitlab':
    		gitlab = new Gitlab({ host: site.url || undefined, token: site.token });
    		// const tree = await gitlab.Repositories.allRepositoryTrees(site.repo, { ref: site.branch || undefined, recursive: true });
    		// console.log(tree)
    		// return; // TODO finish support
    		break;
    	case 'disk':
    		const opts = { mode: "readwrite" };
    		diskHandle = await getDiskHandle(i);
    		if (!(await diskHandle.queryPermission(opts)))
    			await diskHandle.requestPermission(opts);
    		// for await (const [name, handle] of diskHandle.entries()) alert(name);
    		return; // TODO finish support
    		break;
    }

    try {
    	const conf = await readFile('mdadmin.toml'); //webDAV.getFileContents('mdadmin.toml', { format: "text" });
        siteConf = toml.parse(conf);
        setTextarea('#siteconf-modal textarea', conf);
        // $('#siteconf-modal textarea').value = conf;
    } catch(e) {
        console.error(e);
        siteConf = null;
        setTextarea('#siteconf-modal textarea', '');
        // $('#siteconf-modal textarea').value = '';
    }

    await refreshSiteContents();
    $('#site-sections').hidden = false;
    $('#load-progress').hidden = true;
    $('#siteconf-modal textarea').disabled = false;
    $('#siteconf-save-button').disabled = false;
}

async function refreshSiteContents() {
    $('#pages-list').innerHTML = '';
    $('#media-list').innerHTML = '';

    const cache = Date.now();

    for (const folder of getSiteListProp('pages', '/')) { // siteConf?.pages || ['/']) {
    //     if (!folder) continue;
        for (const file of await listDirectory(folder, { cache })) { // webDAV.getDirectoryContents(folder, { deep: true })) {
            if (file.type !== 'file' || !isEditableFile(file.basename)) continue;
            const page = $(`<a class="collection-item" href="#">${file.basename}</a>`, { onclick: ev => {
                ev.preventDefault();
                editPage(file.basename);
            } });
            $('#pages-list').appendChild(page);
        }
    }

    // const media = await listDirectory(siteConf?.media?.[0] || '/'); // webDAV.getDirectoryContents(siteConf?.media?.[0] || '/', { deep: true });
    for (const folder of getSiteListProp('media', '/')) { // siteConf?.media || ['/']) {
    	if (!folder) continue;
        for (const file of await listDirectory(folder, { cache })) {
            if (file.type !== 'file') continue;
            const url = `${getSite().url}/${file.basename}`;
            $('#media-list').appendChild($(`<li class="collection-item">
                <a href="${url}" target="_blank">${isImageFile(file.basename) ? `<img src="${url}" loading="lazy" />` : '🔗'}</a>
                <span>${file.basename}</span>
            </li>`));
        }
    }

    clearFsCache(cache);
}

async function editPage(filepath, isNew) {
    $('#load-progress').hidden = false;
    $('#filepath-input').value = filepath;

    currEditor.disable?.();
    currEditor.setText('');
    
    setScreen('editor', !filepath && 'scratchpad');
    setHash(filepath);

    if (filepath && !isNew) {
        // const raw = await webDAV.getFileContents(filepath, { format: "text" });
        currEditor.setText(await readFile(filepath)); // (raw);
    } else if (!filepath) {
        currEditor.setText(Spacc.LocalStorage('scratchpad') || '');
    }

    currEditor.enable?.();
    updatePreview();

    $('#load-progress').hidden = true;
}

function setTextarea(textarea, value) {
    if (typeof textarea === 'string')
        textarea = $(textarea);
    if (!textarea) return;
    if (value !== undefined)
        textarea.value = value;
    M.Forms.textareaAutoResize(textarea);
}

function setEditor() {
    const editor = $('#editor-select').selectedOptions[0].value;
	const oldText = currEditor?.getText() || '';
	$('#editor-container').innerHTML = '';
    applyEditorConf({ editor });
	switch (editor) {
		case 'toastui':
			currEditor = new toastui.Editor({
				el: $('#editor-container'),
				// height: 'calc(100vh - 64px)',
				height: 'calc((var(--vh, 1vh) * 100) - 64px)',
				initialValue: oldText, // editBuf,
				initialEditType: 'markdown',
				previewStyle: 'vertical',
                placeholder: MARKDOWN_PLACEHOLDER,
                plugins: Object.values(toastui.Editor.plugin),
				usageStatistics: false,
				events: { change: onEditorInput },
			});
            // currEditor.changePreviewStyle('tab');
			currEditor.getText = currEditor.getMarkdown;
			currEditor.setText = text => currEditor.setMarkdown(editBuf = text);
			break;
		case 'textarea':
		default:
			currEditor = $(`<textarea id="page-content" class="materialize-textarea" placeholder="${MARKDOWN_PLACEHOLDER}"></textarea>`, { value: oldText /* editBuf */ });
			currEditor.getText = () => currEditor.value;
			currEditor.setText = text => setTextarea(currEditor, text);
            // {
			// 	currEditor.value = editBuf = text;
			// 	M.Forms.textareaAutoResize(currEditor);
			// };
			currEditor.addEventListener('input', onEditorInput);
			$('#editor-container').appendChild(currEditor);
			break;
	}
    currEditor.disable = () => currEditor.disabled = true;
    currEditor.enable = () => currEditor.disabled = false;
}

function onEditorInput() {
    if (currEditor.disabled) return;
	editBuf = currEditor.getText();
	if (document.body.dataset.editor === 'scratchpad') {
   	    Spacc.LocalStorage('scratchpad', currEditor.getText());
	} else {
   		setEditingDirty(true);
	}
	updatePreview();
}

function applyEditorConf(upd) {
    Spacc.LocalStorage('editor', Object.assign(editorConf, upd));
    $('#editor-styles').innerHTML = `\
#page-content, div.toastui-editor > div.ProseMirror {
    white-space: ${ editorConf.wordWrap ? 'normal' : 'nowrap' };
    font-family: ${ editorConf.fontFamily || 'unset' };
}
`;
}

function updatePreview() {
    $('#preview-content').innerHTML = $('#preview-html').textContent = marked.parse(currEditor.getText());
    $(':: #preview-content [src]').forEach(el => {
        const src = el.getAttribute('src');
        const test = src.toLowerCase();
        if (!test.startsWith('//') && !test.startsWith('http://') && !test.startsWith('https://')) {
            el.src = `${getSite().url}/${siteConf?.media?.[0] || '/'}/${src}`;
        }
    });
}

function getCurrentSiteIndex() {
    const i = $('#site-select').selectedIndex;
    return (i >= 0) ? i : null;
}

function getSite() {
	return sites[getCurrentSiteIndex()];
}

function setFullWidth(state) {
    $('#container').classList.toggle('container', !state);
    $('#container').classList.toggle('container-fluid', state);
}

function setScreen(target, prop) {
    $('body').dataset.screen = null;
    $('body').dataset[target] = null;
    setEditingDirty(false);
    setFullWidth(false);
    for (const screen of $(':: #container > div[id]'))
        screen.hidden = true;
    $('#' + target).hidden = false;
    $('body').dataset.screen = target;
    $('body').dataset[target] = prop;
}

function setEditingDirty(state) {
    const original = $('#home-button').textContent.replace('*', '');
    $('#home-button').textContent = document.title = original;
    if (state) {
        $('#home-button').textContent = document.title = '*' + original;
    }
    editingDirty = state;
}

function setHash(page) {
    let hash = `/`;
    const site = getCurrentSiteIndex();
    if (site !== null)
        hash += `${site}/`;
    if (page)
        hash += page;
    location.hash = hash;
}

function isEditableFile(filename) {
    return ['md','mdx','markdown'].includes(getFileExtension(filename).toLowerCase());
}

function isImageFile(filename) {
    return ['bmp','png','jpg','jpeg','gif','webp','avif','svg'].includes(getFileExtension(filename).toLowerCase());
}

function getFileExtension(filename) {
    if (filename.search('.') < 0) return '';
    return filename.split('.').slice(-1)[0];
}

// helper: open DB and object store
function openHandlesDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('fs-handles', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('handles');
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveDiskHandle(key, handle) {
  const db = await openHandlesDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(handle, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function getDiskHandle(key) {
  const db = await openHandlesDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('handles', 'readonly');
    const req = tx.objectStore('handles').get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function readFile(path) {
	const site = getSite();
	switch (site.type) {
		case 'dav':
			return webDAV.getFileContents(path, { format: "text" });
		case 'gitlab':
			return gitlab.RepositoryFiles.showRaw(site.repo, path, site.branch || undefined);
	}
}

function writeFile(path, body) {
    const site = getSite();
	switch (site.type) {
		case 'dav':
			return webDAV.putFileContents(path, body, { overwrite: true });
		case 'gitlab':
			return gitlab.RepositoryFiles.edit(site.repo, path, site.branch || undefined, body);
    }
}

async function listDirectory(path, { cache }) {
    cache = fsCacheKey(cache);
    const cached = fsCaches[cache]?.[path];
    if (cached) return cached;
    // const cached = fsCaches[fsCacheKey(cache)];
	// if (cached)
	// 	return cached;
	let res;
	const site = getSite();
	switch (site.type) {
		case 'dav':
			res = await webDAV.getDirectoryContents(path, { deep: true });
			break;
		case 'gitlab':
			res = await gitlab.Repositories.allRepositoryTrees(site.repo, { ref: site.branch || undefined, recursive: true });
			for (const item of res) {
				if (item.type === 'blob') item.type = 'file';
				item.basename = item.path;
			}
			break;
	}
	// if (cache)
	// 	fsCaches[fsCacheKey(cache)] = res;
    if (cache) {
        if (!fsCaches[cache]) fsCaches[cache] = {};
        fsCaches[cache][path] = res;
    }
	return res;
}

function clearFsCache(key) {
	delete fsCaches[fsCacheKey(key)];
}

function fsCacheKey(key) {
	if (!key) return null;
	return `${getCurrentSiteIndex()}/${key}`;
}

function setVirtualHeight() {
	vh = window.innerHeight * 0.01;
	document.documentElement.style.setProperty('--vh', `${vh}px`);
}

function getDarkTheme() {
    const isDarkModeEnabledViaCss = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    const currentTheme = Spacc.LocalStorage('theme');
    const isDark = currentTheme ? currentTheme === 'dark' : isDarkModeEnabledViaCss;
    return isDark;
}

function setDarkTheme(state) {
    document.documentElement.setAttribute('theme', state ? 'dark' : 'light');
    Spacc.LocalStorage('theme', state ? 'dark' : 'light');
}

function updateDarkModeButton(current) {
    $('#theme-button').classList.remove('is-dark');
    if (current)
        $('#theme-button').classList.add('is-dark');
    $('#theme-button > .material-icons').textContent = current ? 'light_mode' : 'dark_mode';
    $('#theme-button').title = `Switch to ${current ? 'light' : 'dark'} mode`;
}

$('#theme-button').addEventListener('click', e => {
    e.preventDefault();
    const nextState = !getDarkTheme();
    setDarkTheme(nextState);
    updateDarkModeButton(nextState);
});
const currentState = getDarkTheme();
setDarkTheme(currentState);
updateDarkModeButton(currentState);

window.addEventListener('beforeunload', function(e) {
    if (!editingDirty) return;
    e.preventDefault();
    e.returnValue = ''; // Required for Chrome
    return '';
});

window.addEventListener('resize', setVirtualHeight);
</script>
